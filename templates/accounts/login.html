{% extends 'base.html' %}
{% block title %}Login - iPremium Store{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-200">
        <div class="text-center">
            <div class="mx-auto w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-user text-3xl text-blue-900"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Selamat Datang</h2>
            <p class="mt-2 text-sm text-gray-600">Silakan masuk ke akun Anda</p>
        </div>

        <form method="post" class="mt-8 space-y-6">
            {% csrf_token %}
            <div class="space-y-4">
                {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field.errors }}
                    <div class="relative rounded-md shadow-sm">
                        {{ field }}
                    </div>
                </div>
                {% endfor %}
            </div>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-md text-white bg-blue-900 hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-sm transition">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt text-blue-200 group-hover:text-white transition ease-in-out duration-150"></i>
                    </span>
                    Masuk
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Belum punya akun? 
                <a href="{% url 'accounts:register' %}" class="font-bold text-blue-900 hover:text-blue-500 transition">Daftar sekarang</a>
            </p>
        </div>
    </div>
</div>

<style>
    /* Styling for Django forms */
    input[type="text"], input[type="password"] {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid #d1d5db;
        background-color: #fff;
        transition: all 0.2s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
</style>
{% endblock %}
